server:
  port: 3001

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/document_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: doc-mgr-secret-key-2024-spring-boot
  expiration: 604800000

file:
  upload-dir: ./uploads
  max-size: 52428800
